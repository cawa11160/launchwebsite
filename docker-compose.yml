services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: launchwebsite-app
    ports:
      - "8080:8080"
      - "8787:8787"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    command: npm run dev:all
